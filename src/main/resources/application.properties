

server.port=8080
spring.application.name=gymiq-backend


spring.datasource.url=jdbc:mysql://localhost:3306/gymiq?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.globally_quoted_identifiers=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.open-in-view=false


spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=America/Sao_Paulo
spring.jackson.default-property-inclusion=non_null


gymiq.jwt.secret=gymiq-super-secret-key-2025-must-be-256-bits-long-for-hs256
gymiq.jwt.expiration-ms=86400000


gymiq.api.viacep.url=https://viacep.com.br/ws
gymiq.api.brasilapi.url=https://brasilapi.com.br/api/cpf/v1
