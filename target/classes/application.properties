server.port=8080
spring.application.name=gymiq-backend

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.show-sql=false

spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

spring.flyway.enabled=${SPRING_FLYWAY_ENABLED:true}
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=${SPRING_FLYWAY_BASELINE_ON_MIGRATE:true}
spring.flyway.baseline-version=${SPRING_FLYWAY_BASELINE_VERSION:0}
spring.flyway.baseline-description=Existing GymIQ schema
spring.flyway.validate-on-migrate=${SPRING_FLYWAY_VALIDATE_ON_MIGRATE:true}


spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=America/Sao_Paulo
spring.jackson.default-property-inclusion=non_null

spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE}
gymiq.mail.from=${MAIL_FROM:${MAIL_USERNAME}}


gymiq.jwt.secret=${JWT_SECRET}
gymiq.jwt.expiration-ms=${JWT_EXPIRATION_MS}

gymiq.password-reset.frontend-url=${PASSWORD_RESET_FRONTEND_URL}
gymiq.password-reset.expiration-minutes=${PASSWORD_RESET_EXPIRATION_MINUTES}
gymiq.password-reset.resend-cooldown-minutes=${PASSWORD_RESET_RESEND_COOLDOWN_MINUTES}


gymiq.api.viacep.url=https://viacep.com.br/ws
gymiq.api.brasilapi.url=https://brasilapi.com.br/api/cpf/v1
gymiq.cpf.validation-mode=${CPF_VALIDATION_MODE}

gymiq.jobs.secret=${JOBS_SECRET:}
