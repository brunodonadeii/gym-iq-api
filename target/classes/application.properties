server.port=8080
spring.application.name=gymiq-backend

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false


spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=America/Sao_Paulo
spring.jackson.default-property-inclusion=non_null


gymiq.jwt.secret=${JWT_SECRET}
gymiq.jwt.expiration-ms=${JWT_EXPIRATION_MS}


gymiq.api.viacep.url=https://viacep.com.br/ws
gymiq.api.brasilapi.url=https://brasilapi.com.br/api/cpf/v1

gymiq.jobs.secret=${JOBS_SECRET:}
