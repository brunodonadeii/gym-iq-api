services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gymiq-backend
    environment:
      SPRING_DATASOURCE_URL: ${DB_URL}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}

      GYMIQ_JWT_SECRET: ${JWT_SECRET}
      GYMIQ_JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS}

    ports:
      - "8080:8080"