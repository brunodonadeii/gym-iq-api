services:

  mysql:
    image: mysql:8.0
    container_name: gymiq-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: gymiq2026
      MYSQL_DATABASE: gymiq
      MYSQL_USER: gymiq_user
      MYSQL_PASSWORD: gymiq2026
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "--password=gymiq2026"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gymiq-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/gymiq?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo&characterEncoding=UTF-8
      SPRING_DATASOURCE_USERNAME: gymiq_user
      SPRING_DATASOURCE_PASSWORD: gymiq2026
      GYMIQ_JWT_SECRET: gymiq-super-secret-key-2025-must-be-256-bits-long-for-hs256
      GYMIQ_JWT_EXPIRATION_MS: 86400000
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "false"
      SPRING_JPA_PROPERTIES_HIBERNATE_GLOBALLY_QUOTED_IDENTIFIERS: "true"
    ports:
      - "8080:8080"

volumes:
  mysql_data: